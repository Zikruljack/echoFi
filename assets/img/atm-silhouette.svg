<svg viewBox="0 0 240 380" xmlns="http://www.w3.org/2000/svg" id="atm-svg">
  <defs>
    <filter id="glow-safe">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-danger">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-scan">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ATM Outer Body -->
  <rect x="15" y="10" width="210" height="360" rx="12" ry="12"
        fill="#1a1d27" stroke="#2a2d3a" stroke-width="2"/>

  <!-- ATM Inner Bezel -->
  <rect x="22" y="18" width="196" height="344" rx="9" ry="9"
        fill="#141720" stroke="#2a2d3a" stroke-width="1"/>

  <!-- Bank Logo Area (top strip) -->
  <rect x="22" y="18" width="196" height="28" rx="9" ry="9"
        fill="#1e2232"/>
  <rect x="22" y="36" width="196" height="10"
        fill="#1e2232"/>
  <text x="120" y="36" text-anchor="middle" font-family="'Inter',sans-serif"
        font-size="10" font-weight="700" fill="#64748b" letter-spacing="2">SENTINEL ATM</text>

  <!-- Camera Area (top-right) -->
  <g id="area-camera_area" class="atm-area" data-area="camera_area">
    <circle cx="196" cy="58" r="10" fill="#242836" stroke="#2a2d3a" stroke-width="1.5"/>
    <circle cx="196" cy="58" r="5"  fill="#1a1d27" stroke="#374151" stroke-width="1"/>
    <circle cx="196" cy="58" r="2"  fill="#374151"/>
    <circle cx="194" cy="56" r="1"  fill="rgba(255,255,255,0.15)"/>
    <!-- Indicator LED -->
    <circle cx="206" cy="52" r="2.5" fill="#1a2a1a" stroke="#1f3a1f" stroke-width="1"/>
  </g>

  <!-- Decorative dots (speaker) -->
  <circle cx="42" cy="58" r="1.5" fill="#2a2d3a"/>
  <circle cx="48" cy="58" r="1.5" fill="#2a2d3a"/>
  <circle cx="54" cy="58" r="1.5" fill="#2a2d3a"/>
  <circle cx="42" cy="65" r="1.5" fill="#2a2d3a"/>
  <circle cx="48" cy="65" r="1.5" fill="#2a2d3a"/>
  <circle cx="54" cy="65" r="1.5" fill="#2a2d3a"/>

  <!-- Screen / Front Panel Area -->
  <g id="area-front_panel" class="atm-area" data-area="front_panel">
    <rect x="30" y="48" width="150" height="110" rx="5" ry="5"
          fill="#0f1117" stroke="#2a2d3a" stroke-width="1.5"/>
    <!-- Screen content simulation -->
    <rect x="35" y="54" width="140" height="98" rx="3" fill="#0a0d14"/>
    <!-- Fake screen lines -->
    <rect x="45" y="70"  width="80" height="6" rx="2" fill="#1a2a3a" opacity="0.8"/>
    <rect x="45" y="82"  width="60" height="5" rx="2" fill="#1a2a3a" opacity="0.6"/>
    <rect x="45" y="95"  width="100" height="5" rx="2" fill="#1a2a3a" opacity="0.5"/>
    <rect x="45" y="107" width="70" height="5" rx="2" fill="#1a2a3a" opacity="0.5"/>
    <rect x="45" y="119" width="90" height="5" rx="2" fill="#1a2a3a" opacity="0.4"/>
    <rect x="45" y="131" width="50" height="5" rx="2" fill="#1a2a3a" opacity="0.4"/>
    <!-- Screen reflection -->
    <rect x="35" y="54" width="140" height="30" rx="3" fill="rgba(255,255,255,0.02)"/>
  </g>

  <!-- Side function keys (left of screen) -->
  <rect x="185" y="60" width="14" height="20" rx="3" fill="#242836" stroke="#2a2d3a" stroke-width="1"/>
  <rect x="185" y="86" width="14" height="20" rx="3" fill="#242836" stroke="#2a2d3a" stroke-width="1"/>
  <rect x="185" y="112" width="14" height="20" rx="3" fill="#242836" stroke="#2a2d3a" stroke-width="1"/>
  <rect x="185" y="138" width="14" height="20" rx="3" fill="#242836" stroke="#2a2d3a" stroke-width="1"/>

  <!-- Card Slot -->
  <g id="area-card_slot" class="atm-area" data-area="card_slot">
    <rect x="50" y="170" width="110" height="14" rx="3" ry="3"
          fill="#0f1117" stroke="#2a2d3a" stroke-width="1.5"/>
    <!-- Card slot inner lines -->
    <rect x="54" y="173" width="102" height="1" fill="#374151" opacity="0.6"/>
    <rect x="54" y="178" width="102" height="1" fill="#374151" opacity="0.4"/>
    <!-- Card slot label area -->
    <rect x="50" y="185" width="110" height="8" rx="2" fill="#1a1d27"/>
    <text x="105" y="192" text-anchor="middle" font-family="'Inter',sans-serif"
          font-size="6" fill="#374151" letter-spacing="1">MASUKKAN KARTU</text>
    <!-- Card icon hint -->
    <rect x="162" y="171" width="14" height="10" rx="1" fill="none" stroke="#374151" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Keypad Area -->
  <g id="area-keypad" class="atm-area" data-area="keypad">
    <rect x="45" y="200" width="130" height="110" rx="6" ry="6"
          fill="#161921" stroke="#2a2d3a" stroke-width="1.5"/>
    <!-- Keypad rows 1-3 (numeric) -->
    <!-- Row 1: 1 2 3 -->
    <rect x="55"  y="210" width="30" height="22" rx="4" fill="#1e2232" stroke="#2a2d3a" stroke-width="1"/>
    <rect x="95"  y="210" width="30" height="22" rx="4" fill="#1e2232" stroke="#2a2d3a" stroke-width="1"/>
    <rect x="135" y="210" width="30" height="22" rx="4" fill="#1e2232" stroke="#2a2d3a" stroke-width="1"/>
    <text x="70"  y="225" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" fill="#64748b">1</text>
    <text x="110" y="225" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" fill="#64748b">2</text>
    <text x="150" y="225" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" fill="#64748b">3</text>
    <!-- Row 2: 4 5 6 -->
    <rect x="55"  y="237" width="30" height="22" rx="4" fill="#1e2232" stroke="#2a2d3a" stroke-width="1"/>
    <rect x="95"  y="237" width="30" height="22" rx="4" fill="#1e2232" stroke="#2a2d3a" stroke-width="1"/>
    <rect x="135" y="237" width="30" height="22" rx="4" fill="#1e2232" stroke="#2a2d3a" stroke-width="1"/>
    <text x="70"  y="252" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" fill="#64748b">4</text>
    <text x="110" y="252" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" fill="#64748b">5</text>
    <text x="150" y="252" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" fill="#64748b">6</text>
    <!-- Row 3: 7 8 9 -->
    <rect x="55"  y="264" width="30" height="22" rx="4" fill="#1e2232" stroke="#2a2d3a" stroke-width="1"/>
    <rect x="95"  y="264" width="30" height="22" rx="4" fill="#1e2232" stroke="#2a2d3a" stroke-width="1"/>
    <rect x="135" y="264" width="30" height="22" rx="4" fill="#1e2232" stroke="#2a2d3a" stroke-width="1"/>
    <text x="70"  y="279" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" fill="#64748b">7</text>
    <text x="110" y="279" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" fill="#64748b">8</text>
    <text x="150" y="279" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" fill="#64748b">9</text>
    <!-- Row 4: CLR 0 OK -->
    <rect x="55"  y="291" width="30" height="14" rx="3" fill="#2a1515" stroke="#3a2020" stroke-width="1"/>
    <rect x="95"  y="291" width="30" height="14" rx="3" fill="#1e2232" stroke="#2a2d3a" stroke-width="1"/>
    <rect x="135" y="291" width="30" height="14" rx="3" fill="#152a15" stroke="#203a20" stroke-width="1"/>
    <text x="70"  y="301" text-anchor="middle" font-family="'Inter',sans-serif" font-size="7" fill="#ef4444">CLR</text>
    <text x="110" y="301" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" fill="#64748b">0</text>
    <text x="150" y="301" text-anchor="middle" font-family="'Inter',sans-serif" font-size="7" fill="#22c55e">OK</text>
  </g>

  <!-- Cash/Receipt area -->
  <rect x="60" y="320" width="90" height="18" rx="3" fill="#0f1117" stroke="#2a2d3a" stroke-width="1.5"/>
  <rect x="64" y="324" width="82" height="2"  fill="#374151" opacity="0.5"/>
  <rect x="64" y="329" width="82" height="2"  fill="#374151" opacity="0.3"/>
  <text x="105" y="344" text-anchor="middle" font-family="'Inter',sans-serif"
        font-size="5" fill="#374151" letter-spacing="1">SLOT UANG/STRUK</text>

  <!-- Bottom detail line -->
  <rect x="30" y="352" width="180" height="1" fill="#2a2d3a" opacity="0.5"/>
  <circle cx="120" cy="362" r="4" fill="#1e2232" stroke="#2a2d3a" stroke-width="1"/>

  <!-- Scan line overlay (animated via CSS) -->
  <line id="scan-line" x1="15" y1="10" x2="225" y2="10"
        stroke="rgba(0,212,170,0.8)" stroke-width="2" opacity="0"/>
  <rect id="scan-line-glow" x="15" y="6" width="210" height="8" rx="2"
        fill="rgba(0,212,170,0.1)" opacity="0"/>
</svg>
