<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riwayat Scan — SENTINEL-FI</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg class="nav-logo-icon" viewBox="0 0 32 32" fill="none">
        <path d="M16 2L4 7V15C4 21.6 9.3 27.7 16 30C22.7 27.7 28 21.6 28 15V7L16 2Z" fill="rgba(0,212,170,0.15)" stroke="#00d4aa" stroke-width="1.5"/>
        <path d="M11 16L14.5 19.5L21 13" stroke="#00d4aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="16" cy="12" r="2" fill="#00d4aa" opacity="0.6"/>
      </svg>
      SENTINEL<span>-FI</span>
    </a>
    <div class="nav-menu" id="nav-menu">
      <a href="scan.html"         class="nav-link">Scan</a>
      <a href="map.html"          class="nav-link">Peta</a>
      <a href="history.html"      class="nav-link">Riwayat</a>
      <a href="how-it-works.html" class="nav-link">Cara Kerja</a>
    </div>
    <button class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="container history-wrapper">
  <div class="page-header">
    <h1 class="page-title">📋 Riwayat Scan</h1>
    <p class="page-subtitle">Semua hasil pemindaian ATM yang pernah dilakukan</p>
  </div>

  <!-- Stats -->
  <div class="history-stats-row">
    <div class="hist-stat">
      <div class="hist-stat-val mono" id="hist-total">0</div>
      <div class="hist-stat-lbl">Total Scan</div>
    </div>
    <div class="hist-stat">
      <div class="hist-stat-val mono" id="hist-safe" style="color:var(--success)">0</div>
      <div class="hist-stat-lbl">Aman</div>
    </div>
    <div class="hist-stat">
      <div class="hist-stat-val mono" id="hist-threats" style="color:var(--danger)">0</div>
      <div class="hist-stat-lbl">Ancaman</div>
    </div>
    <a href="scan.html" class="btn btn-primary" style="margin-left:auto;align-self:center">+ Scan Baru</a>
  </div>

  <!-- Filter Tabs -->
  <div class="history-tabs">
    <button class="history-tab active" data-filter="all">Semua</button>
    <button class="history-tab" data-filter="safe">Aman</button>
    <button class="history-tab" data-filter="threat">Ancaman</button>
  </div>

  <!-- History List -->
  <div id="history-list" class="history-list"></div>

  <!-- Empty State -->
  <div id="history-empty" class="history-empty hidden">
    <div class="history-empty-icon">🔍</div>
    <p>Tidak ada riwayat scan untuk filter ini.</p>
    <a href="scan.html" class="btn btn-primary" style="margin-top:1rem">Mulai Scan ATM</a>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="container footer-inner">
    <div>
      <div class="footer-logo">SENTINEL<span>-FI</span></div>
      <div class="footer-tagline">Lindungi Transaksi ATM Anda</div>
    </div>
    <div class="footer-links">
      <a href="index.html"        class="footer-link">Beranda</a>
      <a href="scan.html"         class="footer-link">Scan</a>
      <a href="map.html"          class="footer-link">Peta</a>
      <a href="how-it-works.html" class="footer-link">Cara Kerja</a>
    </div>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/history.js"></script>
</body>
</html>
